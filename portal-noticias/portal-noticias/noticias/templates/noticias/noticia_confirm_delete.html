{% extends 'noticias/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-3">Excluir notícia</h2>
                <p class="text-muted mb-4">Tem certeza de que deseja excluir a notícia "<strong>{{ noticia.titulo }}</strong>"? Esta ação não pode ser desfeita.</p>
                <form method="post" class="d-flex flex-column flex-sm-row gap-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg">Excluir</button>
                    <a class="btn btn-outline-secondary btn-lg" href="{% url 'admin_noticias' %}">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
